# XcodeGen spec — the WhoAmI.xcodeproj is generated from this file.
# Bootstrap / regenerate:  cd WhoAmI && xcodegen generate
# (the .xcodeproj is gitignored on purpose — this YAML is the source of truth.)
name: WhoAmI
options:
  bundleIdPrefix: com.grapevineapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: N89556Y88J   # SixForty Labs LLC — enables Sign in with Apple provisioning
    TARGETED_DEVICE_FAMILY: "1"

targets:
  WhoAmI:
    type: application
    platform: iOS
    sources:
      - path: WhoAmI
    configFiles:
      Debug: WhoAmI/Supporting/Config/Dev.xcconfig
      Release: WhoAmI/Supporting/Config/Prod.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grapevineapp.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: WhoAmI/Supporting/Info.plist
      properties:
        CFBundleDisplayName: Grapevine
        UILaunchScreen: {}
        SupabaseURL: $(SUPABASE_URL)
        SupabaseAnonKey: $(SUPABASE_ANON_KEY)
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryUsageDescription: Pick a photo for your profile.
        NSCameraUsageDescription: Take a photo for your profile.
        NSContactsUsageDescription: Find friends to invite. Contacts are matched on your device and never uploaded.
        UIAppFonts:
          - HankenGrotesk-Light.ttf
          - HankenGrotesk-Regular.ttf
          - HankenGrotesk-Medium.ttf
          - HankenGrotesk-SemiBold.ttf
          - HankenGrotesk-Bold.ttf
          - HankenGrotesk-ExtraBold.ttf
          - HankenGrotesk-Black.ttf
          - SpaceMono-Regular.ttf
          - SpaceMono-Bold.ttf
        CFBundleURLTypes:
          - CFBundleURLName: com.grapevineapp.app
            CFBundleURLSchemes:
              - whoami
    entitlements:
      path: WhoAmI/Supporting/WhoAmI.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    dependencies:
      - package: Supabase
        product: Supabase

  WhoAmITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WhoAmITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WhoAmI

schemes:
  WhoAmI:
    build:
      targets:
        WhoAmI: all
        WhoAmITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WhoAmITests
